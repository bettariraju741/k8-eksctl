apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: expense
  region: us-east-1
  version: "1.31"

iam:
  withOIDC: true

managedNodeGroups:
  - name: expense-workers
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 3

addons:
  - name: vpc-cni
  - name: kube-proxy
  - name: coredns

autoModeConfig:
  enabled: false